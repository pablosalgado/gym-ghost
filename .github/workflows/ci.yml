name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop
      - name: Brakeman
        run: bundle exec brakeman --no-pager
      - name: Bundle Audit
        run: |
          bundle exec bundle-audit check --update

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      ATTR_ENCRYPTED_KEY: test-ci-only-not-a-real-key-32chars!!
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
      - name: Set up DB
        run: bin/rails db:prepare
      - name: RSpec
        run: bundle exec rspec

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Test
        working-directory: frontend
        run: npm run test
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Start and verify production deployment
        run: script/verify_docker.sh
