# Solid Queue recurring tasks. Loaded by the Solid Queue supervisor
# (`bin/jobs`) in production (and any environment where the dispatcher
# runs).
#
# Schedules are parsed by fugit against Rails.application.config.time_zone.
# This app defaults to UTC, so `every day at midnight` == 00:00 UTC.
# If `config.time_zone` is ever changed (e.g. to "America/Bogota" per the
# date-time instructions), re-audit every `schedule:` line in this file.

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  sync_facilities:
    class: SyncFacilitiesJob
    queue: default
    schedule: every day at midnight